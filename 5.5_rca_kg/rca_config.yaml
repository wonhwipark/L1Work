# rca_config.yaml
# Package-level RCA configuration. Tool/readable by P0 and scripts.
# 사용자는 kg_root만 필요 시 수정한다. 기본값 null이면 <workspace_root>/rca_kg 를 사용한다.
package_version: convenience_v0.21_kg_root_config
generated_at_kst: "2026-06-27 12:21 KST"
workspace_root: null
# workspace_root = RCA_standalone package root. P0 resolves this using skill_manifest.yaml.
kg_root: null
# kg_root = persistent RCA knowledge graph store.
# null means default: {workspace_root}/rca_kg
# Recommended fixed example: "D:\AI_Automation\RCA_KG"
kg_root_source: package_default
allow_create_kg_root: true
preserve_existing_kg: true
forbidden_kg_root_contains:
  - '\\.claude\\skills\\'
  - '/.claude/skills/'
required_kg_dirs:
  - cases
  - cases/unresolved
  - runtime_tool_generate
  - runtime_tool_generate/format_profiles
  - signals_tool_generate
  - indexes_tool_generate
  - manifest_fragments
  - schema
  - skills_seed
