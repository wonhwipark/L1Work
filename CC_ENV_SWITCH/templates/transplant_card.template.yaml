# transplant_card.yaml — 사내 이식 카드
# STEP 1(리눅스)의 출력 형식이자 STEP 3(설치)의 입력.
# apply_card.ps1 은 아래 env_keys 블록만 신뢰해서 corp 프로파일에 반영한다.
# ⚠️ 토큰/시크릿 실제 값은 절대 여기 적지 말 것. 토큰은 OS 환경변수로만.

version: "1.0"
extracted_at: "REPLACE_ISO8601_KST"
source_machine: "linux-corp"

# 사람이 읽는 요약 (스크립트는 무시)
provider:
  type: "gateway"            # gateway | litellm | direct
  base_url_host: "REPLACE_GATEWAY_HOST"
  auth_method: "bearer"      # bearer(AUTH_TOKEN) | api_key(API_KEY)
  model_alias: ""            # 게이트웨이 전용 모델명, 없으면 비움

# ↓↓↓ 스크립트가 실제로 반영하는 블록 (env_keys) ↓↓↓
# - 값이 빈 키는 무시됨
# - ANTHROPIC_AUTH_TOKEN 은 여기 적어도 무시되고 ${CORP_ANTHROPIC_TOKEN} 으로 강제됨
env_keys:
  ANTHROPIC_BASE_URL: "https://REPLACE_GATEWAY_HOST"
  ANTHROPIC_MODEL: ""
  CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
  NO_PROXY: ""

# 참고 정보 (스크립트 무시)
custom_headers: []           # 헤더 "이름"만, 값 금지
notes: ""
